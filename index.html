<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="失物招领平台 - 帮助您找回失物或归还拾到的物品" />
  <title>寻迹 · 失物招领平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="i18n.js"></script>
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="#">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="url(#logoGrad)" stroke-width="2"/>
          <path d="M9 14a5 5 0 1 1 10 0" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round"/>
          <circle cx="14" cy="14" r="2.5" fill="url(#logoGrad)"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop stop-color="#a78bfa"/>
              <stop offset="1" stop-color="#38bdf8"/>
            </linearGradient>
          </defs>
        </svg>
        寻迹
      </a>
      <div class="nav-actions">
        <!-- 语言切换按钮 -->
        <div class="language-selector">
          <button class="btn-ghost lang-btn" id="btnLanguage" title="切换语言">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span id="langDisplay">中文</span>
          </button>
          <div class="lang-dropdown" id="langDropdown">
            <button class="lang-option" data-lang="zh-CN">简体中文</button>
            <button class="lang-option" data-lang="zh-TW">繁體中文</button>
            <button class="lang-option" data-lang="en-US">English</button>
          </div>
        </div>
        
        <button class="btn-ghost" id="btnOpenPublish" data-i18n="nav.publishBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          发布物品
        </button>
        
        <!-- 未登录状态 -->
        <div id="authButtonsGroup" class="auth-buttons-group">
          <button class="btn-ghost" id="btnLogin" data-i18n="nav.login">登录</button>
          <button class="btn-primary" id="btnRegister" data-i18n="nav.register">注册</button>
        </div>
        
        <!-- 已登录状态 -->
        <div id="userMenuGroup" class="user-menu-group" style="display:none">
          <div class="user-menu">
            <button class="user-menu-btn" id="btnUserMenu">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M12 14c-6 0-8 3-8 3v6h16v-6s-2-3-8-3z"/></svg>
              <span id="userMenuUsername">用户</span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="user-menu-dropdown" id="userMenuDropdown">
              <button class="user-menu-item" id="btnMyItems">我的发布</button>
              <button class="user-menu-item" id="btnLogout">退出登录</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== Hero ===== -->
  <header class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <h1 class="hero-title">失物招领，让爱回家</h1>
      <p class="hero-subtitle">丢失物品？捡到东西？在这里发布，让失物与主人重逢。</p>

      <!-- 统计看板 -->
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-num" id="statLost">0</span>
          <span class="stat-label">待认领失物</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="statFound">0</span>
          <span class="stat-label">招领物品</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="statSolved">0</span>
          <span class="stat-label">成功找回</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== 搜索 & 筛选 ===== -->
  <section class="filter-section">
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" class="search-input" type="text" placeholder="搜索物品名称、地点或描述…" />
    </div>

    <div class="filter-row">
      <div class="filter-group">
        <span class="filter-label">状态</span>
        <div class="tab-group" id="tabStatus">
          <button class="tab active" data-value="all">全部</button>
          <button class="tab" data-value="lost">失物</button>
          <button class="tab" data-value="found">招领</button>
          <button class="tab" data-value="solved">已解决</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">类别</span>
        <div class="tab-group" id="tabCategory">
          <button class="tab active" data-value="all">全部</button>
          <button class="tab" data-value="electronics">电子产品</button>
          <button class="tab" data-value="id">证件</button>
          <button class="tab" data-value="wallet">钱包</button>
          <button class="tab" data-value="keys">钥匙</button>
          <button class="tab" data-value="bag">包类</button>
          <button class="tab" data-value="other">其他</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== 物品列表 ===== -->
  <main class="main-content">
    <div class="list-header">
      <span id="resultCount" class="result-count">共 0 条</span>
      <select id="sortSelect" class="sort-select">
        <option value="newest">最新发布</option>
        <option value="oldest">最早发布</option>
      </select>
    </div>
    <div class="card-grid" id="cardGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>没有找到相关物品</p>
    </div>
  </main>

  <!-- ===== 登录弹窗 ===== -->
  <div class="modal-overlay" id="loginOverlay">
    <div class="modal modal-auth" id="loginModal">
      <div class="modal-header">
        <h2 class="modal-title">登录</h2>
        <button class="modal-close" id="btnCloseLogin">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-row">
          <label class="form-label" for="loginUsername">用户名或邮箱 <span class="req">*</span></label>
          <input class="form-input" id="loginUsername" type="text" placeholder="输入用户名或邮箱" required />
        </div>

        <div class="form-row">
          <label class="form-label" for="loginPassword">密码 <span class="req">*</span></label>
          <input class="form-input" id="loginPassword" type="password" placeholder="输入密码" required />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" style="width: 100%">登录</button>
        </div>

        <div class="auth-switch">
          <span>还没有账户？</span>
          <button type="button" class="link-btn" id="btnSwitchToRegister">注册新账户</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== 注册弹窗 ===== -->
  <div class="modal-overlay" id="registerOverlay">
    <div class="modal modal-auth" id="registerModal">
      <div class="modal-header">
        <h2 class="modal-title">注册</h2>
        <button class="modal-close" id="btnCloseRegister">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form id="registerForm" novalidate>
        <div class="form-row">
          <label class="form-label" for="registerUsername">用户名 <span class="req">*</span></label>
          <input class="form-input" id="registerUsername" type="text" placeholder="3-20 个字符" minlength="3" maxlength="20" required />
          <small class="form-hint">用户名长度需要 3-20 个字符</small>
        </div>

        <div class="form-row">
          <label class="form-label" for="registerEmail">邮箱 <span class="req">*</span></label>
          <input class="form-input" id="registerEmail" type="email" placeholder="输入邮箱地址" required />
        </div>

        <div class="form-row">
          <label class="form-label" for="registerPassword">密码 <span class="req">*</span></label>
          <input class="form-input" id="registerPassword" type="password" placeholder="至少 6 个字符" minlength="6" required />
          <small class="form-hint">密码长度至少 6 个字符</small>
        </div>

        <div class="form-row">
          <label class="form-label" for="registerPassword2">确认密码 <span class="req">*</span></label>
          <input class="form-input" id="registerPassword2" type="password" placeholder="再次输入密码" required />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" style="width: 100%">注册</button>
        </div>

        <div class="auth-switch">
          <span>已有账户？</span>
          <button type="button" class="link-btn" id="btnSwitchToLogin">直接登录</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== 发布弹窗 ===== -->
  <div class="modal-overlay" id="publishOverlay">
    <div class="modal" id="publishModal">
      <div class="modal-header">
        <h2 class="modal-title">发布物品信息</h2>
        <button class="modal-close" id="btnClosePublish">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form id="publishForm" novalidate>
        <!-- 类型 -->
        <div class="form-row">
          <label class="form-label">我要发布</label>
          <div class="type-toggle">
            <label class="type-radio">
              <input type="radio" name="type" value="lost" checked />
              <span class="type-btn">🔍 我丢失了</span>
            </label>
            <label class="type-radio">
              <input type="radio" name="type" value="found" />
              <span class="type-btn">📦 我捡到了</span>
            </label>
          </div>
        </div>

        <!-- 标题 -->
        <div class="form-row">
          <label class="form-label" for="fieldTitle">物品名称 <span class="req">*</span></label>
          <input class="form-input" id="fieldTitle" type="text" placeholder="例如：黑色 AirPods Pro" maxlength="50" required />
        </div>

        <!-- 类别 -->
        <div class="form-row">
          <label class="form-label" for="fieldCategory">物品类别 <span class="req">*</span></label>
          <select class="form-input" id="fieldCategory" required>
            <option value="">请选择</option>
            <option value="electronics">电子产品</option>
            <option value="id">证件/卡片</option>
            <option value="wallet">钱包</option>
            <option value="keys">钥匙</option>
            <option value="bag">包类</option>
            <option value="other">其他</option>
          </select>
        </div>

        <!-- 两列：日期 + 地点 -->
        <div class="form-row form-row-2col">
          <div>
            <label class="form-label" for="fieldDate">时间 <span class="req">*</span></label>
            <input class="form-input" id="fieldDate" type="date" required />
          </div>
          <div>
            <label class="form-label" for="fieldLocation">地点 <span class="req">*</span></label>
            <input class="form-input" id="fieldLocation" type="text" placeholder="例如：图书馆二楼" required />
          </div>
        </div>

        <!-- 描述 -->
        <div class="form-row">
          <label class="form-label" for="fieldDesc">详细描述</label>
          <textarea class="form-input form-textarea" id="fieldDesc" placeholder="描述物品特征、颜色、品牌等…" rows="3" maxlength="300"></textarea>
        </div>

        <!-- 图片上传 -->
        <div class="form-row">
          <label class="form-label">上传图片（最多 3 张）</label>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="fieldImages" accept="image/*" multiple hidden />
            <button type="button" class="upload-btn" id="btnPickImages">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              点击或拖拽上传图片
            </button>
            <div class="preview-row" id="previewRow"></div>
          </div>
        </div>

        <!-- 联系方式 -->
        <div class="form-row">
          <label class="form-label" for="fieldContact">联系方式 <span class="req">*</span></label>
          <input class="form-input" id="fieldContact" type="text" placeholder="手机号 / 微信 / QQ 等" required />
        </div>

        <div class="form-actions">
          <button type="button" class="btn-ghost" id="btnCancelPublish">取消</button>
          <button type="submit" class="btn-primary">发布</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== 详情弹窗 ===== -->
  <div class="modal-overlay" id="detailOverlay">
    <div class="modal modal-detail" id="detailModal">
      <button class="modal-close" id="btnCloseDetail">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- ===== 浮动按钮 (移动端) ===== -->
  <button class="fab" id="fabPublish" title="发布物品">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
